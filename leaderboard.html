<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: #e8eef5;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: none;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.7;
        }

        .login-button {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #ffd700; /* Bright gold color */
            color: #000; /* Black text for contrast */
            border: 2px solid #fff;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: background 0.3s ease;
            z-index: 1000;
        }

        .login-button:hover {
            background: #ffed4e; /* Lighter gold on hover */
        }

        .podium-section {
            background: rgba(30, 35, 50, 0.5);
            border-radius: 15px 15px 0 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 40px 20px 20px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            min-height: 400px;
            backdrop-filter: blur(10px);
        }

        .pedestal {
            flex: 1;
            max-width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-width: 0;
        }

        .pedestal-info {
            background: linear-gradient(135deg, rgba(120, 130, 150, 0.3) 0%, rgba(100, 110, 130, 0.2) 100%);
            color: #e8eef5;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            width: 100%;
            margin-bottom: -1px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border: 1px solid rgba(180, 190, 220, 0.2);
            overflow: visible;
            min-width: 0;
        }

        .pedestal-rank {
            font-size: 3em;
            margin: 0;
            height: 0;
        }

        .pedestal-name {
            font-size: clamp(0.95em, 1.6vw, 1.1em);
            font-weight: 600;
            margin-bottom: 10px;
            word-break: break-word;
            overflow-wrap: anywhere;
            white-space: normal;
            line-height: 1.1;
            hyphens: auto;
        }

        .pedestal-score {
            font-size: 1.8em;
            font-weight: bold;
            margin-top: auto;
            margin-bottom: 0;
        }

        .pedestal-base {
            background: linear-gradient(135deg, rgba(100, 110, 130, 0.3) 0%, rgba(80, 90, 110, 0.2) 100%);
            width: 100%;
            padding: 15px;
            border-radius: 0 0 10px 10px;
            font-weight: bold;
            color: #b4bedd;
            border-top: 1px solid rgba(180, 190, 220, 0.2);
        }

        .pedestal.rank-1 .pedestal-info {
            background: linear-gradient(135deg, rgba(200, 170, 80, 0.4) 0%, rgba(180, 150, 60, 0.3) 100%);
            order: -1;
            min-height: 240px;
            border: 1px solid rgba(220, 190, 100, 0.3);
        }

        .pedestal.rank-2 .pedestal-info {
            background: linear-gradient(135deg, rgba(180, 190, 210, 0.3) 0%, rgba(160, 170, 190, 0.2) 100%);
            min-height: 180px;
            border: 1px solid rgba(190, 200, 220, 0.2);
        }

        .pedestal.rank-3 .pedestal-info {
            background: linear-gradient(135deg, rgba(170, 140, 100, 0.3) 0%, rgba(150, 120, 80, 0.2) 100%);
            min-height: 140px;
            border: 1px solid rgba(190, 160, 120, 0.2);
        }

        .pedestal.rank-1 .pedestal-score {
            color: rgb(200, 170, 80);
        }

        .pedestal.rank-2 .pedestal-score {
            color: #b4bedd;
        }

        .pedestal.rank-3 .pedestal-score {
            color: rgb(139, 122, 99);
        }

        .pedestal-badges {
            display: grid;
            grid-template-columns: repeat(2, auto);
            gap: 4px;
            margin-top: 10px;
            margin-bottom: auto;
            justify-items: center;
            align-items: center;
            justify-content: center;
        }

        .leaderboard {
            background: rgba(30, 35, 50, 0.5);
            border-radius: 0 0 15px 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: visible;
            backdrop-filter: blur(10px);
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid rgba(180, 190, 220, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .leaderboard-item:hover {
            background-color: rgba(100, 110, 130, 0.15);
            transform: translateX(5px);
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 35, 50, 0.95);
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            margin: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #e8eef5;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #d4af6f;
        }

        .modal-title {
            color: #e8eef5;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            margin-right: 30px;
        }

        .modal-badges {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .modal-badge-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .modal-badge-img {
            width: 70px;
            height: 70px;
            border-radius: 25%;
            border: 2px solid rgba(180, 190, 220, 0.3);
            object-fit: cover;
            transition: opacity 0.2s ease;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #e8eef5;
            background: rgba(255, 255, 255, 0.04);
        }

        .modal-badge-img.earned {
            opacity: 1;
        }

        .modal-badge-img.secret-badge {
            background: rgba(255, 255, 255, 0.08);
            border-style: dashed;
            color: #59656d;
            font-size: 2rem;
            text-shadow: none;
        }

        .modal-badge-item.secret .modal-badge-label {
            color: #666;
        }

        .modal-badge-img.unearned {
            opacity: 0.3;
            filter: grayscale(100%);
        }

        .modal-badge-label {
            font-size: 0.85em;
            text-align: center;
            color: #e8eef5;
            word-break: break-word;
        }

        .modal-badge-item.unearned .modal-badge-label {
            color: #666;
        }

        .rank {
            font-size: 1.5em;
            font-weight: bold;
            width: 50px;
            text-align: center;
            margin-right: 20px;
            color: #8a95b8;
        }

        .rank.rank-1 {
            color: #d4af6f;
            font-size: 1.8em;
        }

        .rank.rank-2 {
            color: #b4bedd;
            font-size: 1.7em;
        }

        .rank.rank-3 {
            color: #a88f65;
            font-size: 1.6em;
        }

        .team-info {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .team-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #e8eef5;
        }

        .badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badges:empty {
            display: none;
        }

        .badge-overflow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 25%;
            background: rgba(100, 110, 130, 0.3);
            color: #e8eef5;
            font-size: 0.9em;
            font-weight: bold;
            border: 1px solid rgba(180, 190, 220, 0.2);
            flex-shrink: 0;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 25%;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(180, 190, 220, 0.2);
            object-fit: cover;
            flex-shrink: 0;
            outline: none;
            pointer-events: auto;
        }

        .badge-wrapper {
            position: relative;
            display: inline-flex;
            pointer-events: auto;
            user-select: none;
        }

        .badge-wrapper:hover::after,
        .badge-wrapper:focus-within::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(40, 50, 70, 0.9);
            color: #e8eef5;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
            white-space: nowrap;
            margin-bottom: 8px;
            z-index: 1000;
            border: 1px solid rgba(180, 190, 220, 0.2);
            pointer-events: none;
        }

        .score {
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            min-width: 60px;
            text-align: right;
            margin-right: 8px;
        }

        .score-label {
            font-size: 0.8em;
            color: #8a95b8;
            display: inline;
            font-weight: normal;
        }

        .pedestal-info .score-label {
            margin-left: 8px;
        }

        .last-updated {
            text-align: center;
            color: #b4bedd;
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .badge-glow-i {
            filter: drop-shadow(0 0 12px rgba(205, 127, 50, 1.0)); /* bronze glow */
        }

        .badge-glow-ii {
            filter: drop-shadow(0 0 12px rgba(192, 192, 192, 1.0)); /* silver glow */
        }

        .badge-glow-iii {
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 1.0)); /* gold glow */
        }

        .badge-overlay {
            position: absolute;
            top: 3px;
            right: 6px;
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }

        .modal-badge-img-container {
            position: relative;
            display: inline-block;
        }

        .modal-badge-overlay {
            position: absolute;
            top: 5px;
            right: 10px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }

        .leaderboard-item .score {
            filter: blur(10px);
        }

        /* Mobile responsiveness */
        @media (max-width: 767px) {
            .container {
                padding: 20px 10px;
            }

            .header h1 {
                font-size: 2em;
            }

            .header p {
                font-size: 1em;
            }

            .login-button {
                font-size: 0.8em;
                padding: 6px 12px;
            }

            .podium-section {
                padding: 20px 10px;
                gap: 10px;
            }

            .pedestal {
                max-width: 150px;
            }

            .pedestal-info {
                padding: 15px;
            }

            .pedestal-name {
                font-size: clamp(0.8em, 1.2vw, 1em);
            }

            .pedestal-score {
                font-size: 1.4em;
            }

            .leaderboard-item {
                padding: 15px 20px;
            }

            .rank {
                font-size: 1.2em;
                width: 40px;
            }

            .team-name {
                font-size: 1.1em;
            }

            .score {
                font-size: 1.4em;
                min-width: 50px;
            }

            .badge, .badge-overflow {
                width: 40px;
                height: 40px;
                border-radius: 25%;
            }

            .badge-overlay {
                font-size: 8px;
                top: 2px;
                right: 4px;
            }

            .badge-wrapper:hover::after {
                font-size: 0.8em;
                padding: 4px 8px;
            }

            .modal-content {
                padding: 20px;
                max-width: 90%;
            }

            .modal-title {
                font-size: 1.3em;
            }

            .modal-badges {
                grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
                gap: 10px;
            }

            .modal-badge-img {
                width: 50px;
                height: 50px;
            }

            .modal-badge-overlay {
                font-size: 10px;
                top: 3px;
                right: 6px;
            }

            .modal-badge-label {
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><b>5XWF0</b> Wireless Energy Transfer: Team Leaderboard</h1>
            <p>Live Rankings & Achievements</p>
            <button class="login-button" id="loginButton">Login</button>
        </div>

        <div class="leaderboard" id="leaderboard"></div>

        <div class="modal" id="badgeModal">
            <div class="modal-content">
                <button class="modal-close" id="modalClose">&times;</button>
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-badges" id="modalBadges"></div>
            </div>
        </div>

        <div class="modal" id="loginModal">
            <div class="modal-content">
                <button class="modal-close" id="loginModalClose">&times;</button>
                <div class="modal-title">Team Login</div>
                <div class="login-form">
                    <input type="password" id="passkeyInput" placeholder="Enter passkey" style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid rgba(180, 190, 220, 0.2); border-radius: 5px; background: rgba(30, 35, 50, 0.5); color: #e8eef5;">
                    <button id="loginSubmit" style="width: 100%; padding: 10px; background: rgba(100, 110, 130, 0.3); color: #e8eef5; border: 1px solid rgba(180, 190, 220, 0.2); border-radius: 5px; cursor: pointer;">Login</button>
                </div>
            </div>
        </div>

        <div class="last-updated">
            Last updated: <span id="timestamp"></span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        // CONFIGURATION - Replace with your Google Sheet CSV URL
        // To get this URL:
        // 1. Create a Google Sheet with columns: Team Name, Score, Badges
        // 2. Share it publicly (Anyone with link can view)
        // 3. Get the Sheet ID from the URL (between /d/ and /edit)
        // 4. Use this format: https://docs.google.com/spreadsheets/d/SHEET_ID/export?format=csv
        
        // Get spreadsheet ID and password GID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const spreadsheetId = urlParams.get('spreadsheet');
        const passwordGid = urlParams.get('gid');
        const GOOGLE_SHEET_URL = spreadsheetId ? `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv` : null;
        const PASSWORD_URL = spreadsheetId && passwordGid ? `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=${passwordGid}` : null;

        let loggedInTeam = null;
        let teamPasswords = new Map();

        // Badge image mapping (from Google Sheet)
        const badgeImages = {
            'warranty voider': 'Images/ic.png',
            'wet with wet': 'Images/wetsystem.png',
            'the golden tome': 'Images/workshops.png',
            'outstanding solution award i': 'Images/bestchallenge.png',
            'outstanding solution award ii': 'Images/bestchallenge.png',
            'outstanding solution award iii': 'Images/bestchallenge.png',
            'golden trace i': 'Images/goldentrace.png',
            'golden trace ii': 'Images/goldentrace.png',
            'golden trace iii': 'Images/goldentrace.png',
            'design harmony i': 'Images/bestsetup.png',
            'design harmony ii': 'Images/bestsetup.png',
            'design harmony iii': 'Images/bestsetup.png',
            'sweet spot seeker': 'Images/generator.png',
            'load detection specialists': 'Images/loaddetect.png',
            'sharpshooters i': 'Images/accuracy.png',
            'sharpshooters ii': 'Images/accuracy.png',
            'sharpshooters iii': 'Images/accuracy.png',
            'top earner': 'Images/safe.png',
            'high roller': 'Images/moneybag.png',
            'sustainable innovators': 'Images/sustainable.png',
            'adventurers i': 'Images/quests.png',
            'adventurers ii': 'Images/quests.png',
            'adventurers iii': 'Images/quests.png',
        };

        const badgeTooltips = {
            'warranty voider': 'Warranty Voider',
            'wet with wet': 'WET with WET',
            'the golden tome': 'The Golden Tome',
            'outstanding solution award': 'Outstanding Solution Award',
            'golden trace': 'Golden Trace',
            'design harmony': 'Design Harmony',
            'sweet spot seeker': 'Sweet Spot Seeker',
            'load detection specialists': 'Load Detection Specialists',
            'sharpshooters': 'Sharpshooters',
            'top earner': 'Top Earner',
            'high roller': 'High Roller',
            'sustainable innovators': 'Sustainable Innovators',
            'adventurers': 'Adventurers'
        };

        function getBadgeLevel(badgeKey) {
            if (badgeKey.endsWith(' i')) return { level: 'I', glowClass: 'badge-glow-i' };
            if (badgeKey.endsWith(' ii')) return { level: 'II', glowClass: 'badge-glow-ii' };
            if (badgeKey.endsWith(' iii')) return { level: 'III', glowClass: 'badge-glow-iii' };
            return null;
        }

        function getBadgeBaseAndLevel(badgeKey) {
            if (badgeKey.endsWith(' i')) return { base: badgeKey.slice(0, -2), level: 1 };
            if (badgeKey.endsWith(' ii')) return { base: badgeKey.slice(0, -3), level: 2 };
            if (badgeKey.endsWith(' iii')) return { base: badgeKey.slice(0, -4), level: 3 };
            return { base: badgeKey, level: 0 };
        }

        function parseTeams(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 3) return [];  // Need at least headers + 1 data row

            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const teams = [];

            for (let i = 2; i < lines.length; i++) {  // Start from row 3 (0-based index 2)
                const parts = lines[i].split(',').map(p => p.trim());
                if (parts.length < 2) continue;

                const name = parts[0];
                const score = parseInt(parts[1]) || 0;

                const badges = [];

                // Start from column index 4 (E column, 0-based)
                for (let j = 4; j < headers.length; j++) {
                    const badgeKey = headers[j];
                    const value = parts[j];

                    if (value === "TRUE") {
                        console.log(badgeKey);
                        badges.push({
                            imagePath: badgeImages[badgeKey] || 'Images/placeholder.png',
                            tooltip: badgeTooltips[badgeKey] || badgeKey,
                            key: badgeKey
                        });
                    }
                }

                teams.push({ name, score, badges });
            }

            return teams.sort((a, b) => b.score - a.score);
        }

        function parsePasswords(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return new Map();

            const passwords = new Map();
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',').map(p => p.trim());
                if (parts.length >= 2) {
                    const team = parts[0];
                    const pass = parts[1];
                    passwords.set(team, pass);
                }
            }
            return passwords;
        }


        function renderBadges(badges, isMobile = false, maxBadges = null) {
            let max = maxBadges;
            if (max === null) {
                max = badges.length;  // Show all badges
            }

            if (badges.length <= max) {
                return badges
                    .map(badge => {
                        const levelInfo = getBadgeLevel(badge.key);
                        const glowClass = levelInfo ? levelInfo.glowClass : '';
                        const overlayText = levelInfo ? `<span class="badge-overlay">${levelInfo.level}</span>` : '';
                        return `<span class="badge-wrapper" data-tooltip="${badge.tooltip}"><img class="badge ${badge.key} ${glowClass}" src="${badge.imagePath}" alt="${badge.tooltip}" tabindex="0" onerror="this.src='https://placehold.co/32x32'">${overlayText}</span>`;
                    })
                    .join('');
            }

            const shown = badges.slice(0, max)
                .map(badge => {
                    const levelInfo = getBadgeLevel(badge.key);
                    const glowClass = levelInfo ? levelInfo.glowClass : '';
                    const overlayText = levelInfo ? `<span class="badge-overlay">${levelInfo.level}</span>` : '';
                    return `<span class="badge-wrapper" data-tooltip="${badge.tooltip}"><img class="badge ${badge.key} ${glowClass}" src="${badge.imagePath}" alt="${badge.tooltip}" tabindex="0" onerror="this.src='https://placehold.co/32x32'">${overlayText}</span>`;
                })
                .join('');
            const overflow = `<div class="badge-overflow">+${badges.length - max}</div>`;
            return shown + overflow;
        }

        function showBadgeModal(teamName, earnedBadges) {
            const modal = document.getElementById('badgeModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBadges = document.getElementById('modalBadges');
            
            modalTitle.textContent = teamName;
            modalBadges.innerHTML = '';
            
            // Group earned badges by base name and find highest level
            const earnedMap = new Map();
            earnedBadges.forEach(badge => {
                const { base, level } = getBadgeBaseAndLevel(badge.key);
                if (!earnedMap.has(base) || earnedMap.get(base) < level) {
                    earnedMap.set(base, level);
                }
            });
            
            // Get all unique base badge keys
            const allBaseKeys = new Set();
            Object.keys(badgeImages).forEach(key => {
                const { base } = getBadgeBaseAndLevel(key);
                allBaseKeys.add(base);
            });
            
            // Create badge items for each base badge
            Array.from(allBaseKeys).sort().forEach(baseKey => {
                const earnedLevel = earnedMap.get(baseKey) || 0;
                const isEarned = earnedMap.has(baseKey);
                
                // Find the image path (use level 1 for tiered badges, or the base for non-tiered)
                let imageKey = baseKey;
                if (earnedLevel > 0) {
                    // For earned tiered badges, use the specific level key for image
                    if (earnedLevel === 1) imageKey = baseKey + ' i';
                    else if (earnedLevel === 2) imageKey = baseKey + ' ii';
                    else if (earnedLevel === 3) imageKey = baseKey + ' iii';
                } else {
                    // For unearned, check if it's a tiered badge and use level 1
                    if (badgeImages[baseKey + ' i']) imageKey = baseKey + ' i';
                }
                
                const levelInfo = earnedLevel > 0 ? { level: earnedLevel === 1 ? 'I' : earnedLevel === 2 ? 'II' : 'III', glowClass: earnedLevel === 1 ? 'badge-glow-i' : earnedLevel === 2 ? 'badge-glow-ii' : 'badge-glow-iii' } : null;
                const glowClass = levelInfo ? levelInfo.glowClass : '';
                const overlayText = levelInfo ? `<span class="modal-badge-overlay">${levelInfo.level}</span>` : '';
                
                const badgeItem = document.createElement('div');
                badgeItem.className = `modal-badge-item ${isEarned ? 'earned' : 'unearned'}`;
                
                const imgClass = isEarned ? 'earned' : 'unearned';
                badgeItem.innerHTML = `
                    <div class="modal-badge-img-container">
                        <img class="modal-badge-img ${imgClass} ${glowClass}" src="${badgeImages[imageKey]}" alt="${badgeTooltips[baseKey] || baseKey}" onerror="this.src='https://placehold.co/70x70'">
                        ${overlayText}
                    </div>
                    <div class="modal-badge-label">${badgeTooltips[baseKey] || baseKey}</div>
                `;
                
                modalBadges.appendChild(badgeItem);
            });

            // Add four secret badge placeholders without revealing graphics.
            for (let i = 1; i <= 4; i++) {
                const secretItem = document.createElement('div');
                secretItem.className = 'modal-badge-item secret';
                secretItem.innerHTML = `
                    <div class="modal-badge-img secret-badge">?</div>
                    <div class="modal-badge-label">Secret Badge</div>
                `;
                modalBadges.appendChild(secretItem);
            }
            
            modal.classList.add('active');
        }

        function closeBadgeModal() {
            const modal = document.getElementById('badgeModal');
            modal.classList.remove('active');
        }

        function closeLoginModal() {
            const modal = document.getElementById('loginModal');
            modal.classList.remove('active');
        }

        function showLoginModal() {
            const modal = document.getElementById('loginModal');
            modal.classList.add('active');
            document.getElementById('passkeyInput').focus();
        }

        function attemptLogin() {
            const passkey = document.getElementById('passkeyInput').value.trim();
            if (!passkey) return;

            for (let [team, password] of teamPasswords) {
                if (password === passkey) {
                    loggedInTeam = team;
                    closeLoginModal();
                    document.getElementById('passkeyInput').value = '';
                    unblurTeamScore(team);
                    document.getElementById('loginButton').textContent = team;
                    alert(`Logged in as ${team}`);
                    return;
                }
            }
            alert('Invalid passkey');
        }

        function unblurTeamScore(teamName) {
            const items = document.querySelectorAll('.leaderboard-item');
            items.forEach(item => {
                const teamNameEl = item.querySelector('.team-name');
                if (teamNameEl && teamNameEl.textContent === teamName) {
                    const scoreEl = item.querySelector('.score');
                    if (scoreEl) {
                        scoreEl.style.filter = 'none';
                    }
                }
            });
        }

        function renderLeaderboard(teams) {
            const leaderboard = document.getElementById('leaderboard');
            leaderboard.innerHTML = '';
            
            if (teams.length === 0) {
                leaderboard.innerHTML = '<div style="padding: 40px; text-align: center; color: #999;">No data found. Check your Google Sheet URL.</div>';
                return;
            }

            const isMobile = window.innerWidth < 768;

            // Render podium for top 3
            const podiumHTML = '<div class="podium-section" id="podium"></div>';
            leaderboard.innerHTML = podiumHTML;
            const podium = document.getElementById('podium');

            // Create pedestals for top 3 (in order: 2nd, 1st, 3rd for visual balance)
            const topThree = teams.slice(0, 3);
            const pedestalOrder = [1, 0, 2]; // 2nd place, 1st place, 3rd place
            
            pedestalOrder.forEach(idx => {
                if (topThree[idx]) {
                    const team = topThree[idx];
                    const rank = idx + 1;
                    
                    let maxBadgesForRank = 3;
                    if (rank === 1) maxBadgesForRank = 5;        // gold: max 5
                    else if (rank === 2) maxBadgesForRank = 3;   // silver: max 3
                    else if (rank === 3) maxBadgesForRank = 1;   // bronze: max 1
                    
                    const badgesHTML = renderBadges(team.badges, isMobile, maxBadgesForRank);
                    
                    let rankEmoji = '';
                    
                    const pedestal = document.createElement('div');
                    pedestal.className = `pedestal rank-${rank}`;
                    pedestal.style.cursor = 'pointer';
                    pedestal.innerHTML = `
                        <div class="pedestal-info">
                            <div class="pedestal-rank">${rankEmoji}</div>
                            <div class="pedestal-name">${team.name}</div>
                            <div class="pedestal-badges">${badgesHTML}</div>
                            <div class="pedestal-score">${team.score.toLocaleString()}<span class="score-label">WET</span></div>
                        </div>
                        <div class="pedestal-base">#${rank}</div>
                    `;
                    pedestal.addEventListener('click', () => showBadgeModal(team.name, team.badges));
                    podium.appendChild(pedestal);
                }
            });

            // Render list for remaining teams
            if (teams.length > 3) {
                const listContainer = document.createElement('div');
                listContainer.style.borderRadius = '0 0 15px 15px';
                
                teams.slice(3).forEach((team, index) => {
                    const rank = index + 4;
                    const item = document.createElement('div');
                    item.className = 'leaderboard-item';

                    const badgesHTML = renderBadges(team.badges, isMobile, null);

                    item.innerHTML = `
                        <div class="rank">#${rank}</div>
                        <div class="team-info">
                            <div class="team-name">${team.name}</div>
                            <div class="badges">${badgesHTML}</div>
                        </div>
                        <div class="score">
                            ${team.score.toLocaleString()}
                            <span class="score-label">WET</span>
                        </div>
                    `;

                    item.addEventListener('click', () => showBadgeModal(team.name, team.badges));
                    listContainer.appendChild(item);
                });

                leaderboard.appendChild(listContainer);
            }
        }

        function initLeaderboard() {
            // Check if spreadsheet ID was provided
            if (!GOOGLE_SHEET_URL) {
                const leaderboard = document.getElementById('leaderboard');
                leaderboard.innerHTML = `<div style="padding: 40px; text-align: center; color: #999;">No spreadsheet provided. Add ?spreadsheet=SHEET_ID&gid=PASSWORD_GID to the URL.</div>`;
                return;
            }

            // Fetch CSV from Google Sheet
            Promise.all([
                fetch(GOOGLE_SHEET_URL).then(response => response.text()),
                PASSWORD_URL ? fetch(PASSWORD_URL).then(response => response.text()) : Promise.resolve('')
            ])
            .then(([csvText, passwordCsv]) => {
                const teams = parseTeams(csvText);
                teamPasswords = parsePasswords(passwordCsv);
                renderLeaderboard(teams);
            })
            .catch(error => {
                console.error('Error fetching leaderboard data:', error);
                const leaderboard = document.getElementById('leaderboard');
                leaderboard.innerHTML = `<div style="padding: 40px; text-align: center; color: #e74c3c;">
                    Error loading data. Check console and verify the Google Sheet URL is correct and public.
                </div>`;
            });

            // Update timestamp
            const now = new Date();
            document.getElementById('timestamp').textContent = now.toLocaleString();
        }

        // Modal event listeners
        document.addEventListener('DOMContentLoaded', () => {
            const modalClose = document.getElementById('modalClose');
            const badgeModal = document.getElementById('badgeModal');
            
            if (modalClose) {
                modalClose.addEventListener('click', closeBadgeModal);
            }
            
            if (badgeModal) {
                badgeModal.addEventListener('click', (e) => {
                    if (e.target === badgeModal) {
                        closeBadgeModal();
                    }
                });
            }

            // Login modal
            const loginButton = document.getElementById('loginButton');
            const loginModalClose = document.getElementById('loginModalClose');
            const loginModal = document.getElementById('loginModal');
            const loginSubmit = document.getElementById('loginSubmit');
            const passkeyInput = document.getElementById('passkeyInput');

            if (loginButton) {
                loginButton.addEventListener('click', showLoginModal);
            }

            if (loginModalClose) {
                loginModalClose.addEventListener('click', closeLoginModal);
            }

            if (loginModal) {
                loginModal.addEventListener('click', (e) => {
                    if (e.target === loginModal) {
                        closeLoginModal();
                    }
                });
            }

            if (loginSubmit) {
                loginSubmit.addEventListener('click', attemptLogin);
            }

            if (passkeyInput) {
                passkeyInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        attemptLogin();
                    }
                });
            }

            initLeaderboard();
        });

        // Optional: Auto-refresh every 5 minutes (300000 ms)
        // Uncomment to enable:
        // setInterval(() => {
        //     initLeaderboard();
        // }, 300000);
    </script>
</body>
</html>
