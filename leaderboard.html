<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: #e8eef5;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: none;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.7;
        }

        .podium-section {
            background: rgba(30, 35, 50, 0.5);
            border-radius: 15px 15px 0 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 40px 20px 20px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            min-height: 400px;
            backdrop-filter: blur(10px);
        }

        .pedestal {
            flex: 1;
            max-width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-width: 0;
        }

        .pedestal-info {
            background: linear-gradient(135deg, rgba(120, 130, 150, 0.3) 0%, rgba(100, 110, 130, 0.2) 100%);
            color: #e8eef5;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            width: 100%;
            margin-bottom: -1px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border: 1px solid rgba(180, 190, 220, 0.2);
            overflow: visible;
            min-width: 0;
        }

        .pedestal-rank {
            font-size: 3em;
            margin: 0;
            height: 0;
        }

        .pedestal-name {
            font-size: clamp(0.95em, 1.6vw, 1.1em);
            font-weight: 600;
            margin-bottom: 10px;
            word-break: break-word;
            overflow-wrap: anywhere;
            white-space: normal;
            line-height: 1.1;
            hyphens: auto;
        }

        .pedestal-score {
            font-size: 1.8em;
            font-weight: bold;
            margin-top: auto;
            margin-bottom: 0;
        }

        .pedestal-base {
            background: linear-gradient(135deg, rgba(100, 110, 130, 0.3) 0%, rgba(80, 90, 110, 0.2) 100%);
            width: 100%;
            padding: 15px;
            border-radius: 0 0 10px 10px;
            font-weight: bold;
            color: #b4bedd;
            border-top: 1px solid rgba(180, 190, 220, 0.2);
        }

        .pedestal.rank-1 .pedestal-info {
            background: linear-gradient(135deg, rgba(200, 170, 80, 0.4) 0%, rgba(180, 150, 60, 0.3) 100%);
            order: -1;
            min-height: 240px;
            border: 1px solid rgba(220, 190, 100, 0.3);
        }

        .pedestal.rank-2 .pedestal-info {
            background: linear-gradient(135deg, rgba(180, 190, 210, 0.3) 0%, rgba(160, 170, 190, 0.2) 100%);
            min-height: 180px;
            border: 1px solid rgba(190, 200, 220, 0.2);
        }

        .pedestal.rank-3 .pedestal-info {
            background: linear-gradient(135deg, rgba(170, 140, 100, 0.3) 0%, rgba(150, 120, 80, 0.2) 100%);
            min-height: 140px;
            border: 1px solid rgba(190, 160, 120, 0.2);
        }

        .pedestal.rank-1 .pedestal-score {
            color: rgb(200, 170, 80);
        }

        .pedestal.rank-2 .pedestal-score {
            color: #b4bedd;
        }

        .pedestal.rank-3 .pedestal-score {
            color: rgb(139, 122, 99);
        }

        .pedestal-badges {
            display: grid;
            grid-template-columns: repeat(2, auto);
            gap: 4px;
            margin-top: 10px;
            margin-bottom: auto;
            justify-items: center;
            align-items: center;
            justify-content: center;
        }

        .leaderboard {
            background: rgba(30, 35, 50, 0.5);
            border-radius: 0 0 15px 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: visible;
            backdrop-filter: blur(10px);
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid rgba(180, 190, 220, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .leaderboard-item:hover {
            background-color: rgba(100, 110, 130, 0.15);
            transform: translateX(5px);
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 35, 50, 0.95);
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            margin: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #e8eef5;
            font-size: 1.5em;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #d4af6f;
        }

        .modal-title {
            color: #e8eef5;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            margin-right: 30px;
        }

        .modal-badges {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .modal-badge-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .modal-badge-img {
            width: 70px;
            height: 70px;
            border-radius: 25%;
            border: 2px solid rgba(180, 190, 220, 0.3);
            object-fit: cover;
            transition: opacity 0.2s ease;
        }

        .modal-badge-img.earned {
            opacity: 1;
        }

        .modal-badge-img.unearned {
            opacity: 0.3;
            filter: grayscale(100%);
        }

        .modal-badge-label {
            font-size: 0.85em;
            text-align: center;
            color: #e8eef5;
            word-break: break-word;
        }

        .modal-badge-item.unearned .modal-badge-label {
            color: #666;
        }

        .rank {
            font-size: 1.5em;
            font-weight: bold;
            width: 50px;
            text-align: center;
            margin-right: 20px;
            color: #8a95b8;
            display: none; /* To re-enable, change to: display: flex; */
        }

        .rank.rank-1 {
            color: #d4af6f;
            font-size: 1.8em;
        }

        .rank.rank-2 {
            color: #b4bedd;
            font-size: 1.7em;
        }

        .rank.rank-3 {
            color: #a88f65;
            font-size: 1.6em;
        }

        .team-info {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .team-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #e8eef5;
        }

        .badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badges:empty {
            display: none;
        }

        .badge-overflow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 25%;
            background: rgba(100, 110, 130, 0.3);
            color: #e8eef5;
            font-size: 0.9em;
            font-weight: bold;
            border: 1px solid rgba(180, 190, 220, 0.2);
            flex-shrink: 0;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 25%;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(180, 190, 220, 0.2);
            object-fit: cover;
            flex-shrink: 0;
            outline: none;
            pointer-events: auto;
        }

        .badge-wrapper {
            position: relative;
            display: inline-flex;
            pointer-events: auto;
            user-select: none;
        }

        .badge-wrapper:hover::after,
        .badge-wrapper:focus-within::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(40, 50, 70, 0.9);
            color: #e8eef5;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
            white-space: nowrap;
            margin-bottom: 8px;
            z-index: 1000;
            border: 1px solid rgba(180, 190, 220, 0.2);
            pointer-events: none;
        }

        .score {
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            min-width: 60px;
            text-align: right;
            margin-right: 8px;
            filter: blur(8px);
            user-select: none;
        }

        .score-label {
            font-size: 0.8em;
            color: #8a95b8;
            display: inline;
            font-weight: normal;
        }

        .pedestal-info .score-label {
            margin-left: 8px;
        }

        .last-updated {
            text-align: center;
            color: #b4bedd;
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2em;
            }

            .podium-section {
                min-height: 300px;
                padding: 30px 10px 15px;
                gap: 10px;
            }

            .pedestal {
                max-width: 100%;
            }

            .pedestal-info {
                padding: 12px;
            }

            .pedestal-rank {
                font-size: 2em;
                margin: 5px 0;
            }

            .pedestal-name {
                font-size: 0.85em;
                margin-bottom: 5px;
                word-break: break-word;
            }

            .pedestal-score {
                font-size: 1.3em;
                margin-top: 5px;
            }

            .pedestal-base {
                padding: 10px;
                font-size: 0.85em;
            }

            .pedestal-badges {
                gap: 3px;
            }

            .badge {
                width: 35px;
                height: 35px;
                font-size: 0.7em;
            }

            .badges {
                flex-wrap: nowrap;
                max-width: auto;
                overflow: hidden;
            }

            .badge-overflow {
                width: 35px;
                height: 35px;
                font-size: 0.7em;
            }

            .leaderboard-item {
                padding: 15px 20px;
            }

            .rank {
                width: 40px;
                margin-right: 15px;
            }

            .team-info {
                flex-direction: column;
                align-items: flex-start;
            }

            .score {
                text-align: left;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><b>5XWF0</b> Wireless Energy Transfer: Team Leaderboard</h1>
            <p>Live Rankings & Achievements</p>
        </div>

        <div class="leaderboard" id="leaderboard"></div>

        <div class="modal" id="badgeModal">
            <div class="modal-content">
                <button class="modal-close" id="modalClose">&times;</button>
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-badges" id="modalBadges"></div>
            </div>
        </div>

        <div class="last-updated">
            Last updated: <span id="timestamp"></span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        // CONFIGURATION - Replace with your Google Sheet CSV URL
        // To get this URL:
        // 1. Create a Google Sheet with columns: Team Name, Score, Badges
        // 2. Share it publicly (Anyone with link can view)
        // 3. Get the Sheet ID from the URL (between /d/ and /edit)
        // 4. Use this format: https://docs.google.com/spreadsheets/d/SHEET_ID/export?format=csv
        
        // Get spreadsheet ID from URL parameter (required)
        const urlParams = new URLSearchParams(window.location.search);
        const spreadsheetId = urlParams.get('spreadsheet');
        const GOOGLE_SHEET_URL = spreadsheetId ? `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv` : null;

        // Badge image mapping (from Google Sheet)
        const badgeImages = {
            '100w': 'Images/100w.png',
            '200w': 'Images/200w.png',
            'accuracy': 'Images/accuracy.png',
            'camera': 'Images/camera.png',
            'ic': 'Images/ic.png',
            'highestpower': 'Images/highestpower.png',
            'moneybag': 'Images/moneybag.png',
            'phoenix': 'Images/phoenix.png',
            'recycle': 'Images/recycle.png',
            'sustainable': 'Images/sustainable.png',
            'generator': 'Images/generator.png'
        };

        const badgeTooltips = {
            '100w': 'Reached 100W',
            '200w': 'Reached 200W',
            'accuracy': 'Perfect Accuracy',
            'camera': 'Best Team Picture',
            'ic': 'Microcontroller Wizards',
            'highestpower': 'Highest Power Output',
            'moneybag': 'Spent the most WET',
            'phoenix': 'Bounced Back from Zero',
            'recycle': 'Recycling Champion',
            'sustainable': 'Best Sustainable Design',
            'generator': 'Generator Experts'
        };

        function parseTeams(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const teams = [];

            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',').map(p => p.trim());
                if (parts.length < 2) continue;

                const name = parts[0];
                const score = parseInt(parts[1]) || 0;

                const badges = [];

                // Start from column index 2 (badge columns)
                for (let j = 2; j < headers.length; j++) {
                    const badgeKey = headers[j];
                    const value = parts[j];

                    if (value === "TRUE") {
                        badges.push({
                            imagePath: badgeImages[badgeKey] || 'Images/placeholder.png',
                            tooltip: badgeTooltips[badgeKey] || badgeKey,
                            key: badgeKey
                        });
                    }
                }

                teams.push({ name, score, badges });
            }

            return teams.sort((a, b) => b.score - a.score);
        }


        function renderBadges(badges, isMobile = false, maxBadges = null) {
            let max = maxBadges;
            if (max === null) {
                max = isMobile ? 2 : badges.length;
            }

            if (badges.length <= max) {
                return badges
                    .map(badge => `<span class="badge-wrapper" data-tooltip="${badge.tooltip}" onclick="event.stopPropagation()"><img class="badge ${badge.key}" src="${badge.imagePath}" alt="${badge.tooltip}" tabindex="0" onerror="this.src='https://placehold.co/32x32'"></span>`)
                    .join('');
            }

            const shown = badges.slice(0, max)
                .map(badge => `<span class="badge-wrapper" data-tooltip="${badge.tooltip}" onclick="event.stopPropagation()"><img class="badge ${badge.key}" src="${badge.imagePath}" alt="${badge.tooltip}" tabindex="0" onerror="this.src='https://placehold.co/32x32'"></span>`)
                .join('');
            const overflow = `<div class="badge-overflow">+${badges.length - max}</div>`;
            return shown + overflow;
        }

        function showBadgeModal(teamName, earnedBadges) {
            const modal = document.getElementById('badgeModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBadges = document.getElementById('modalBadges');
            
            modalTitle.textContent = teamName;
            modalBadges.innerHTML = '';
            
            // Get all available badge keys
            const allBadgeKeys = Object.keys(badgeImages);
            const earnedKeys = new Set(earnedBadges.map(b => b.key));
            
            // Create badge items for all badges
            allBadgeKeys.forEach(badgeKey => {
                const isEarned = earnedKeys.has(badgeKey);
                const badgeItem = document.createElement('div');
                badgeItem.className = `modal-badge-item ${isEarned ? 'earned' : 'unearned'}`;
                
                const imgClass = isEarned ? 'earned' : 'unearned';
                badgeItem.innerHTML = `
                    <img class="modal-badge-img ${imgClass}" src="${badgeImages[badgeKey]}" alt="${badgeTooltips[badgeKey]}" onerror="this.src='https://placehold.co/70x70'">
                    <div class="modal-badge-label">${badgeTooltips[badgeKey]}</div>
                `;
                
                modalBadges.appendChild(badgeItem);
            });
            
            modal.classList.add('active');
        }

        function closeBadgeModal() {
            const modal = document.getElementById('badgeModal');
            modal.classList.remove('active');
        }

        function shuffleArray(array) {
            // Fisher-Yates shuffle algorithm
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function renderLeaderboard(teams) {
            const leaderboard = document.getElementById('leaderboard');
            leaderboard.innerHTML = '';
            
            if (teams.length === 0) {
                leaderboard.innerHTML = '<div style="padding: 40px; text-align: center; color: #999;">No data found. Check your Google Sheet URL.</div>';
                return;
            }

            const isMobile = window.innerWidth < 768;

            // Render podium for top 3
            const podiumHTML = '<div class="podium-section" id="podium"></div>';
            leaderboard.innerHTML = podiumHTML;
            const podium = document.getElementById('podium');

            // Create pedestals for top 3 (in order: 2nd, 1st, 3rd for visual balance)
            const topThree = teams.slice(0, 3);
            const pedestalOrder = [1, 0, 2]; // 2nd place, 1st place, 3rd place
            
            pedestalOrder.forEach(idx => {
                if (topThree[idx]) {
                    const team = topThree[idx];
                    const rank = idx + 1;
                    
                    let maxBadgesForRank = 3;
                    if (rank === 1) maxBadgesForRank = 5;        // gold: max 5
                    else if (rank === 2) maxBadgesForRank = 3;   // silver: max 3
                    else if (rank === 3) maxBadgesForRank = 1;   // bronze: max 1
                    
                    const badgesHTML = renderBadges(team.badges, isMobile, maxBadgesForRank);
                    
                    let rankEmoji = '';
                    
                    const pedestal = document.createElement('div');
                    pedestal.className = `pedestal rank-${rank}`;
                    pedestal.style.cursor = 'pointer';
                    pedestal.innerHTML = `
                        <div class="pedestal-info">
                            <div class="pedestal-rank">${rankEmoji}</div>
                            <div class="pedestal-name">${team.name}</div>
                            <div class="pedestal-badges">${badgesHTML}</div>
                            <div class="pedestal-score">${team.score.toLocaleString()}<span class="score-label">WET</span></div>
                        </div>
                        <div class="pedestal-base">#${rank}</div>
                    `;
                    pedestal.addEventListener('click', () => showBadgeModal(team.name, team.badges));
                    podium.appendChild(pedestal);
                }
            });

            // Render list for remaining teams
            if (teams.length > 3) {
                const listContainer = document.createElement('div');
                listContainer.style.borderRadius = '0 0 15px 15px';
                
                // Randomize the order of non-podium teams
                const shuffledTeams = shuffleArray(teams.slice(3));
                shuffledTeams.forEach((team, index) => {
                    const rank = index + 4;
                    const item = document.createElement('div');
                    item.className = 'leaderboard-item';

                    const badgesHTML = renderBadges(team.badges, isMobile, null);

                    item.innerHTML = `
                        <div class="rank">#${rank}</div>
                        <div class="team-info">
                            <div class="team-name">${team.name}</div>
                            <div class="badges">${badgesHTML}</div>
                        </div>
                        <div class="score">
                            ${team.score.toLocaleString()}
                            <span class="score-label">WET</span>
                        </div>
                    `;

                    item.addEventListener('click', () => showBadgeModal(team.name, team.badges));
                    listContainer.appendChild(item);
                });

                leaderboard.appendChild(listContainer);
            }
        }

        function initLeaderboard() {
            // Check if spreadsheet ID was provided
            if (!GOOGLE_SHEET_URL) {
                const leaderboard = document.getElementById('leaderboard');
                leaderboard.innerHTML = `<div style="padding: 40px; text-align: center; color: #999;">No spreadsheet provided. Add ?spreadsheet=SHEET_ID to the URL.</div>`;
                return;
            }

            // Fetch CSV from Google Sheet
            fetch(GOOGLE_SHEET_URL)
                .then(response => response.text())
                .then(csvText => {
                    const teams = parseTeams(csvText);
                    renderLeaderboard(teams);
                })
                .catch(error => {
                    console.error('Error fetching leaderboard data:', error);
                    const leaderboard = document.getElementById('leaderboard');
                    leaderboard.innerHTML = `<div style="padding: 40px; text-align: center; color: #e74c3c;">
                        Error loading data. Check console and verify the Google Sheet URL is correct and public.
                    </div>`;
                });

            // Update timestamp
            const now = new Date();
            document.getElementById('timestamp').textContent = now.toLocaleString();
        }

        // Modal event listeners
        document.addEventListener('DOMContentLoaded', () => {
            const modalClose = document.getElementById('modalClose');
            const badgeModal = document.getElementById('badgeModal');
            
            if (modalClose) {
                modalClose.addEventListener('click', closeBadgeModal);
            }
            
            if (badgeModal) {
                badgeModal.addEventListener('click', (e) => {
                    if (e.target === badgeModal) {
                        closeBadgeModal();
                    }
                });
            }
            
            initLeaderboard();
        });

        // Optional: Auto-refresh every 5 minutes (300000 ms)
        // Uncomment to enable:
        // setInterval(() => {
        //     initLeaderboard();
        // }, 300000);
    </script>
</body>
</html>
